name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  build-and-deploy:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[skip ci]')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci
      - run: npm run build
      - run: |
          cp dist/index.html index.html
          cp dist/404.html 404.html
          rm -rf assets
          cp -r dist/assets assets
          touch .nojekyll

      - uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: Deploy built site [skip ci]
          file_pattern: index.html 404.html assets/** .nojekyll
